spring:
  application:
    name: rpg
  datasource:
    url: jdbc:postgresql://localhost:5431/rpg_db
    username: rpg_admin
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true


  sql:
    init:
      mode: never

jwt:
  secret:
    key: "mySecretKeyForJWTTokenGenerationAndValidationPurposesOnlyDoNotUseInProduction1234567890"
  expiration:
    ms: 3600000