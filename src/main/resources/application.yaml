spring:
  application:
    name: rpg
  profiles:
    active: local
  datasource:
    url: ###########
    username: ###########
    password: ###########
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        javax.persistence.schema-generation.scripts.action: create
        javax.persistence.schema-generation.scripts.create-target: src/main/resources/db/migration/generated.sql


  sql:
    init:
      mode: never

jwt:
  secret:
    key: "mySecretKeyForJWTTokenGenerationAndValidationPurposesOnlyDoNotUseInProduction1234567890"
  expiration:
    ms: 3600000